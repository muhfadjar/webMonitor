version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: webmonitor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-webmonitor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-webmonitor}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-webmonitor}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: webmonitor-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  migrator:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: migrator
    container_name: webmonitor-migrator
    restart: 'no'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-webmonitor}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-webmonitor}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@webmonitor.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-admin123}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-Admin}
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: webmonitor-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-webmonitor}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-webmonitor}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: webmonitor-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-webmonitor}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-webmonitor}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      PAGE_CHECK_CONCURRENCY: ${PAGE_CHECK_CONCURRENCY:-20}
      SITE_DISCOVERY_CONCURRENCY: ${SITE_DISCOVERY_CONCURRENCY:-5}
      SSL_CHECK_CONCURRENCY: ${SSL_CHECK_CONCURRENCY:-10}
      REQUEST_TIMEOUT_MS: ${REQUEST_TIMEOUT_MS:-10000}
      SITEMAP_TIMEOUT_MS: ${SITEMAP_TIMEOUT_MS:-15000}
      MAX_SITEMAPS: ${MAX_SITEMAPS:-200}
      MAX_PAGES: ${MAX_PAGES:-50000}
      USER_AGENT: ${USER_AGENT:-WebMonitor/1.0}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      ALERT_COOLDOWN_HOURS: ${ALERT_COOLDOWN_HOURS:-1}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD-SHELL', 'nc -z redis 6379 || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: webmonitor-pgadmin
    restart: unless-stopped
    profiles:
      - debug
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
